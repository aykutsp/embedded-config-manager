    <rect x="700" y="120" width="215" height="108" rx="8" fill="#111c33" stroke="#1f2a44"/>
    <text x="716" y="144" fill="#64748b" font-size="11" font-weight="600">LAST APPLY</text>
    <text x="716" y="176" fill="#f1f5f9" font-size="22" font-weight="700">success</text>
    <text x="716" y="198" fill="#94a3b8" font-size="11">r-1042 · 4 steps · 1.8s</text>
