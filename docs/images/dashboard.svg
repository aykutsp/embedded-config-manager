    <g transform="translate(871,316)">
      <circle cx="6" cy="6" r="4" fill="#f59e0b"/>
      <text x="18" y="10" fill="#e2e8f0" font-weight="600">r-1043 · pending</text>
      <text x="18" y="26" fill="#64748b">Increase sensor poll · admin</text>
