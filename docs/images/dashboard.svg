  <text x="330" y="556" text-anchor="middle" fill="#052e1a" font-size="12" font-weight="700">Apply r-1043</text>
  <rect x="404" y="534" width="128" height="34" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="468" y="556" text-anchor="middle" fill="#e2e8f0" font-size="12">View diff</text>
  <rect x="542" y="534" width="128" height="34" rx="6" fill="#1e293b" stroke="#334155"/>
  <text x="606" y="556" text-anchor="middle" fill="#e2e8f0" font-size="12">Rollback</text>

