  <text x="266" y="628" fill="#f1f5f9" font-size="14" font-weight="700">Apply Pipeline — r-1042</text>
  <text x="266" y="646" fill="#64748b" font-size="11">success · 1.8s total</text>

  <g font-size="10">
    <rect x="266" y="664" width="150" height="32" rx="4" fill="#0b2a1e" stroke="#10b981"/>
