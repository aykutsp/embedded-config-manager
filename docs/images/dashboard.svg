  <g>
    <rect x="250" y="120" width="215" height="108" rx="8" fill="#111c33" stroke="#1f2a44"/>
    <text x="266" y="144" fill="#64748b" font-size="11" font-weight="600">ACTIVE REVISION</text>
    <text x="266" y="176" fill="#f1f5f9" font-size="22" font-weight="700">r-1042</text>
    <text x="266" y="198" fill="#94a3b8" font-size="11">applied 2h ago · admin</text>
    <text x="266" y="214" fill="#10b981" font-size="11">● healthy</text>

    <rect x="475" y="120" width="215" height="108" rx="8" fill="#111c33" stroke="#1f2a44"/>
    <text x="491" y="144" fill="#64748b" font-size="11" font-weight="600">PENDING REVISION</text>
    <text x="491" y="176" fill="#f1f5f9" font-size="22" font-weight="700">r-1043</text>
    <text x="491" y="198" fill="#94a3b8" font-size="11">validated · 3 modules changed</text>
    <rect x="491" y="204" width="78" height="18" rx="9" fill="url(#warn)"/>
