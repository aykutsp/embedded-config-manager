    <rect x="426" y="664" width="150" height="32" rx="4" fill="#0b2a1e" stroke="#10b981"/>
    <text x="501" y="684" text-anchor="middle" fill="#34d399" font-weight="700">✓ backup (80ms)</text>
    <rect x="586" y="664" width="150" height="32" rx="4" fill="#0b2a1e" stroke="#10b981"/>
    <text x="661" y="684" text-anchor="middle" fill="#34d399" font-weight="700">✓ render + write</text>
    <rect x="746" y="664" width="170" height="32" rx="4" fill="#0b2a1e" stroke="#10b981"/>
    <text x="831" y="684" text-anchor="middle" fill="#34d399" font-weight="700">✓ reload services</text>
    <rect x="926" y="664" width="230" height="32" rx="4" fill="#0b2a1e" stroke="#10b981"/>
    <text x="1041" y="684" text-anchor="middle" fill="#34d399" font-weight="700">✓ health checks (1.4s)</text>
  </g>
