      <text x="18" y="26" fill="#64748b">Bad WAN gateway · auto-revert</text>
    </g>
    <g transform="translate(871,524)">
      <circle cx="6" cy="6" r="4" fill="#10b981"/>
      <text x="18" y="10" fill="#e2e8f0" font-weight="600">r-1039 · applied</text>
      <text x="18" y="26" fill="#64748b">Hostname change · admin</text>
    </g>
