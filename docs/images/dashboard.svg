  </defs>

  <!-- window chrome -->
  <rect width="1200" height="740" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="38" rx="10" fill="#0b1220"/>
  <rect x="0" y="28" width="1200" height="10" fill="#0b1220"/>
  <circle cx="22" cy="19" r="6" fill="#ef4444"/>
  <circle cx="42" cy="19" r="6" fill="#f59e0b"/>
  <circle cx="62" cy="19" r="6" fill="#10b981"/>
  <text x="600" y="24" text-anchor="middle" fill="#64748b" font-size="12">embedded-config-manager · gateway-03.lan</text>

  <!-- sidebar -->
  <rect x="0" y="38" width="220" height="702" fill="#0b1324"/>
  <text x="24" y="78" fill="#e2e8f0" font-size="15" font-weight="700">● ConfigBox</text>
  <text x="24" y="96" fill="#475569" font-size="10">v0.1 · local</text>

  <g font-size="13" fill="#94a3b8">
    <rect x="12" y="120" width="196" height="34" rx="6" fill="#1e293b"/>
    <text x="28" y="141" fill="#e2e8f0" font-weight="600">Dashboard</text>
    <text x="28" y="179">Config Editor</text>
    <text x="28" y="213">Revisions</text>
    <text x="28" y="247">Diff Viewer</text>
    <text x="28" y="281">Apply Center</text>
    <text x="28" y="315">Rollback</text>
    <text x="28" y="349">Audit Log</text>
    <text x="28" y="383">Services</text>
    <text x="28" y="417">Schemas</text>
  </g>
  <text x="24" y="705" fill="#475569" font-size="11">admin · LAN only</text>

  <!-- top bar -->
  <text x="250" y="78" fill="#f1f5f9" font-size="22" font-weight="700">Dashboard</text>
  <text x="250" y="98" fill="#64748b" font-size="12">Current state of this device</text>
  <rect x="1000" y="64" width="170" height="34" rx="6" fill="#1e293b" stroke="#334155"/>
