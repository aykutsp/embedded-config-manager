    <text x="941" y="176" fill="#f1f5f9" font-size="22" font-weight="700">r-1039 → r-1038</text>
    <text x="941" y="198" fill="#94a3b8" font-size="11">3 days ago · auto · VPN down</text>
    <text x="941" y="214" fill="#64748b" font-size="11">recovered to last-known-good</text>
