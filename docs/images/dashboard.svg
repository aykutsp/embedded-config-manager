      <text x="596" y="404" fill="#94a3b8">2h ago</text>
      <text x="750" y="404" fill="#64748b">vpn.conf</text>

      <text x="266" y="430">sensor-agent</text>
      <circle cx="492" cy="426" r="4" fill="#10b981"/><text x="502" y="430" fill="#10b981">active</text>
      <text x="596" y="430" fill="#94a3b8">2h ago</text>
      <text x="750" y="430" fill="#64748b">io.yaml</text>

      <text x="266" y="456">telemetry-agent</text>
      <circle cx="492" cy="452" r="4" fill="#f59e0b"/><text x="502" y="456" fill="#f59e0b">reloading</text>
      <text x="596" y="456" fill="#94a3b8">12s ago</text>
      <text x="750" y="456" fill="#64748b">telemetry.env</text>

      <text x="266" y="482">config-agent</text>
      <circle cx="492" cy="478" r="4" fill="#10b981"/><text x="502" y="482" fill="#10b981">active</text>
      <text x="596" y="482" fill="#94a3b8">running</text>
      <text x="750" y="482" fill="#64748b">self</text>
